name: OpenCode command

'on':
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode-command:
    runs-on: ubuntu-latest
    concurrency:
      group: opencode-command-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check maintainer permission
        id: check-permission
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ACTOR="${{ github.event.comment.sender.login }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          PERM=$(gh api repos/$OWNER/$REPO/collaborators/$ACTOR/permission --jq '.permission' 2>/dev/null || echo "none")
          if [[ "$PERM" != "write" && "$PERM" != "admin" ]]; then
            gh api repos/$OWNER/$REPO/issues/$NUMBER/comments \
              -f body="@$ACTOR Sorry, the \`/oc\` command is restricted to maintainers." 2>/dev/null || true
            echo "NOT_MAINTAINER=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OpenCode command
        if: steps.check-permission.outputs.NOT_MAINTAINER != 'true'
        uses: anomalyco/opencode/github@latest
        with:
          model: anthropic/claude-opus-4-20250514
          mentions: /oc,/opencode
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
